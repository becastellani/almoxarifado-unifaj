# fly.toml app configuration file generated for almox-sys-unifaj-2026 on 2026-05-23T18:30:46Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'almox-sys-unifaj-2026'
primary_region = 'gru'

[build]

[env]
  STORAGE_PATH = '/var/www/storage'

[[mounts]]
  source = 'almox_storage'
  destination = '/var/www/storage'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
